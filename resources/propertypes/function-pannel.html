<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Prompt Box - Fixed Snap</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ================= 核心 CSS 变量 ================= */
        :root {
            --bg-app: #000000;
            --bg-prompt: #0a0a0a;
            --bg-hover: #1a1a1a;
            --bg-panel: #0f0f0f;
            
            --text-primary: #f3f3f3;
            --text-secondary: #8a8a8a;
            --text-muted: #555555;
            
            --border-color: #2a2a2a;
            --border-focus: #444444;
            
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --spring-easing: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-app);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ================= Prompt 整体容器 ================= */
        .prompt-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--bg-prompt);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .prompt-container:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8);
        }

        /* --- 文本输入区 --- */
        .prompt-textarea {
            width: 100%;
            min-height: 60px;
            max-height: 200px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            line-height: 1.6;
            padding: 16px 20px 8px 20px;
            resize: none;
            outline: none;
        }
        .prompt-textarea::placeholder { color: var(--text-muted); }

        /* --- 底部工具栏 --- */
        .prompt-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px 12px 16px;
        }

        .toolbar-left, .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 13px;
        }
        .btn:hover { background-color: var(--bg-hover); color: var(--text-primary); }

        /* --- 修复细节 1: 旋转加号但不旋转背景 --- */
        .toggle-btn {
            padding: 6px;
            color: var(--text-primary);
        }
        /* 将过渡动画绑定到内部的 icon(svg) 上，而不是外层 button */
        .toggle-btn svg {
            transition: transform 0.5s var(--spring-easing);
        }
        /* 展开时，只旋转 icon，外层背景保持正规圆角矩形 */
        .prompt-container.is-expanded .toggle-btn svg {
            transform: rotate(45deg) scale(1.1);
        }

        .dropdown-btn {
            border: 1px solid var(--border-color);
            padding: 4px 8px 4px 12px;
            gap: 4px;
        }

        .shortcut-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-right: 4px;
        }
        .send-btn {
            background-color: var(--text-primary);
            color: var(--bg-app);
            padding: 6px;
            border-radius: 8px;
        }
        .send-btn:hover { background-color: #d1d1d1; color: var(--bg-app); }

        /* ================= 功能面板 ================= */
        .feature-panel-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s var(--spring-easing);
            background-color: var(--bg-panel);
            border-top: 1px solid transparent;
        }
        .prompt-container.is-expanded .feature-panel-wrapper {
            grid-template-rows: 1fr;
            border-top-color: var(--border-color);
        }

        .feature-panel-inner {
            overflow: hidden;
            /* 将内边距放在外部包裹器上，防止干扰网格计算 */
            padding: 16px; 
        }

        /* --- 修复细节 2: 完美的吸附网格计算 --- */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px 12px; /* 行间距: 16px */
            
            /* 
               精确数学计算:
               Item高度 (66px) * 2行 + 行间距 (16px) = 148px
               把容器严格锁死在 148px，不多一毫，不少一厘
            */
            height: 148px; 
            overflow-y: auto;
            
            scroll-snap-type: y mandatory;
            scrollbar-width: none; 
        }
        .feature-grid::-webkit-scrollbar { display: none; }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 66px; /* 锁死单体高度 */
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            
            /* 吸附点设为 start，完美贴合容器顶部 */
            scroll-snap-align: start; 
        }

        .feature-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .feature-icon-box {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-name {
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
        }

    </style>
</head>
<body>

    <div class="prompt-container" id="promptBox">
        <textarea class="prompt-textarea" placeholder="输入指令，或者描述您想要 Agent 完成的复杂任务..."></textarea>
        
        <div class="prompt-toolbar">
            <div class="toolbar-left">
                <!-- 点击触发旋转和面板展开 -->
                <button class="btn toggle-btn" onclick="toggleFeatures()">
                    <i data-lucide="plus" style="width: 18px; height: 18px;"></i>
                </button>
                
                <button class="btn dropdown-btn">
                    Medium
                    <i data-lucide="chevron-down" style="width: 14px; height: 14px; color: var(--text-muted);"></i>
                </button>
            </div>
            
            <div class="toolbar-right">
                <span class="shortcut-hint">Ctrl+回车</span>
                <button class="btn send-btn">
                    <i data-lucide="arrow-up" style="width: 16px; height: 16px;"></i>
                </button>
            </div>
        </div>

        <div class="feature-panel-wrapper">
            <div class="feature-panel-inner">
                <div class="feature-grid">
                    
                    <!-- 第 1 行 -->
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="paperclip" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">上传附件</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="shrink" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">压缩上下文</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="git-branch" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">创建分支</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="target" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">目标模式</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="globe" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">联网搜索</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="image-plus" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">生成图片</span>
                    </div>

                    <!-- 第 2 行 -->
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="mic" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">语音输入</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="file-code" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">读取代码</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="database" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">查询库</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="bot" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">切换模型</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="save" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">存为预设</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="settings-2" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">高级设置</span>
                    </div>

                    <!-- 第 3 行 (用于验证吸附滚动) -->
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="terminal" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">终端控制</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="folder-search" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">遍历目录</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon-box"><i data-lucide="blocks" style="width: 20px; height: 20px;"></i></div>
                        <span class="feature-name">使用插件</span>
                    </div>
                    
                </div>
            </div>
        </div>

    </div>

    <script>
        // 初始化 Lucide 图标 (重要：这会将 <i> 替换为真实的 <svg>)
        lucide.createIcons();

        // 切换面板显示与按钮内 svg 的旋转
        function toggleFeatures() {
            const promptBox = document.getElementById('promptBox');
            promptBox.classList.toggle('is-expanded');
        }
        
        // 自动调整输入框高度
        const textarea = document.querySelector('.prompt-textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
