<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 配置原型 - SuperAgent</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ================= 核心 CSS 变量 ================= */
        :root {
            --bg-app: #000000;
            --bg-panel: #0a0a0a;
            --bg-hover: #141414;
            --bg-input: #000000;
            
            --text-primary: #f3f3f3;
            --text-secondary: #8a8a8a;
            --text-muted: #555555;
            
            --border-color: #262626;
            --border-focus: #555555;
            
            --btn-primary-bg: #f3f3f3;
            --btn-primary-text: #000000;
            
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        [data-theme="light"] {
            --bg-app: #ffffff;
            --bg-panel: #f9f9f9;
            --bg-hover: #f1f1f1;
            --bg-input: #ffffff;
            
            --text-primary: #111111;
            --text-secondary: #666666;
            --text-muted: #999999;
            
            --border-color: #e5e5e5;
            --border-focus: #aaaaaa;
            
            --btn-primary-bg: #111111;
            --btn-primary-text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-app);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px 100px 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* --- 页面主容器 --- */
        .settings-container {
            width: 100%;
            max-width: 760px; /* 控制最大宽度保证阅读体验 */
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .page-header p {
            color: var(--text-secondary);
        }

        /* ================= 架构 1: 配置块 (Provider Block) ================= */
        .provider-block {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 供应商头部 */
        .provider-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .provider-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .provider-title-group h2 {
            font-size: 18px;
            font-weight: 600;
        }
        .link-icon {
            color: var(--text-muted);
            transition: color 0.2s;
        }
        .link-icon:hover { color: var(--text-primary); }
        
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .delete-btn:hover { background: rgba(255, 68, 68, 0.1); color: #ff4444; }

        /* --- 表单系统样式 --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .form-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-input:focus { border-color: var(--border-focus); }
        
        /* 密码显示/隐藏按钮 */
        .input-icon-btn {
            position: absolute;
            right: 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
        }
        .input-icon-btn:hover { color: var(--text-primary); }

        /* ================= 架构 2: 模型块 (Model Block) ================= */
        .models-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .models-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .models-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .model-block {
            background-color: var(--bg-hover);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .model-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .model-name {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- 高级滑块组件设计 (Range Slider) --- */
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .slider-val {
            font-family: ui-monospace, monospace;
            background: var(--bg-input);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%;
            background: var(--text-primary);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: var(--border-color);
            border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }

        /* ================= 按钮体系 ================= */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        /* 幽灵按钮 (用于新增模型) */
        .btn-ghost {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* 虚线块级按钮 (用于新增供应商) */
        .btn-dashed {
            width: 100%;
            background: transparent;
            border: 1px dashed var(--border-focus);
            color: var(--text-secondary);
            padding: 16px;
            font-size: 14px;
        }
        .btn-dashed:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
            background: var(--bg-panel);
        }

    </style>
</head>
<body>

    <main class="settings-container">
        
        <div class="page-header">
            <h1>API 与模型配置</h1>
            <p>管理您的 LLM 供应商密钥与模型基础属性。</p>
        </div>

        <!-- ================= 配置块 1：官方 OpenAI ================= -->
        <div class="provider-block">
            <!-- 块头部 -->
            <div class="provider-header">
                <div class="provider-title-group">
                    <i data-lucide="box" style="width: 20px; height: 20px;"></i>
                    <h2>OpenAI</h2>
                    <a href="#" class="link-icon" title="访问官网"><i data-lucide="external-link" style="width: 14px; height: 14px;"></i></a>
                </div>
                <button class="delete-btn" title="删除该配置"><i data-lucide="trash-2" style="width: 16px; height: 16px;"></i></button>
            </div>

            <!-- 公共配置区域 (BaseUrl, API Key) -->
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">供应商名称</label>
                    <input type="text" class="form-input" value="OpenAI" readonly style="color: var(--text-muted); cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label class="form-label">Base URL (可选)</label>
                    <input type="text" class="form-input" placeholder="https://api.openai.com/v1">
                </div>
                <div class="form-group full-width">
                    <label class="form-label">API Key</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" value="sk-proj-xxxxxxxxxxxxxxxxxxxxxx" id="api-key-1">
                        <button class="input-icon-btn" onclick="togglePassword('api-key-1')">
                            <i data-lucide="eye" style="width: 16px; height: 16px;"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 内部模型列表区域 -->
            <div class="models-section">
                <div class="models-header">
                    <h3>下属模型配置</h3>
                    <button class="btn btn-ghost"><i data-lucide="plus" style="width: 14px; height: 14px;"></i> 新增模型</button>
                </div>

                <!-- 模型块 1 -->
                <div class="model-block">
                    <div class="model-block-header">
                        <div class="model-name">
                            <i data-lucide="cpu" style="width: 16px; height: 16px; color: var(--text-muted);"></i>
                            gpt-4o
                        </div>
                        <button class="delete-btn" style="padding: 2px;"><i data-lucide="x" style="width: 14px; height: 14px;"></i></button>
                    </div>
                    
                    <!-- 模型参数配置 (Grid排版) -->
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">上下文长度 (Max Tokens)</label>
                            <input type="number" class="form-input" value="128000">
                        </div>
                        
                        <div class="slider-group">
                            <div class="slider-header">
                                <label class="form-label">Temperature</label>
                                <span class="slider-val" id="val-temp-1">0.7</span>
                            </div>
                            <!-- Range 滑块 -->
                            <input type="range" min="0" max="2" step="0.1" value="0.7" oninput="updateSliderVal('val-temp-1', this.value)">
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ================= 配置块 2：自定义兼容供应商 (如 DeepSeek) ================= -->
        <div class="provider-block">
            <div class="provider-header">
                <div class="provider-title-group">
                    <i data-lucide="blocks" style="width: 20px; height: 20px;"></i>
                    <input type="text" value="DeepSeek" style="background:transparent; border:none; color:var(--text-primary); font-size:18px; font-weight:600; outline:none; width:120px;">
                    <a href="#" class="link-icon"><i data-lucide="external-link" style="width: 14px; height: 14px;"></i></a>
                </div>
                <button class="delete-btn" title="删除该配置"><i data-lucide="trash-2" style="width: 16px; height: 16px;"></i></button>
            </div>

            <div class="form-grid">
                <div class="form-group full-width">
                    <label class="form-label">Base URL</label>
                    <input type="text" class="form-input" value="https://api.deepseek.com/v1">
                </div>
                <div class="form-group full-width">
                    <label class="form-label">API Key</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" value="sk-deepseek-example-key" id="api-key-2">
                        <button class="input-icon-btn" onclick="togglePassword('api-key-2')">
                            <i data-lucide="eye" style="width: 16px; height: 16px;"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="models-section">
                <div class="models-header">
                    <h3>下属模型配置</h3>
                    <button class="btn btn-ghost"><i data-lucide="plus" style="width: 14px; height: 14px;"></i> 新增模型</button>
                </div>

                <!-- 模型块 1 (DeepSeek Reasoner) -->
                <div class="model-block">
                    <div class="model-block-header">
                        <div class="model-name">
                            <i data-lucide="cpu" style="width: 16px; height: 16px; color: var(--text-muted);"></i>
                            <input type="text" value="deepseek-reasoner" style="background:transparent; border:none; color:var(--text-primary); font-size:15px; font-weight:600; outline:none;">
                        </div>
                        <button class="delete-btn" style="padding: 2px;"><i data-lucide="x" style="width: 14px; height: 14px;"></i></button>
                    </div>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">上下文长度</label>
                            <input type="number" class="form-input" value="64000">
                        </div>
                        <div class="slider-group">
                            <div class="slider-header">
                                <label class="form-label">Temperature</label>
                                <span class="slider-val" id="val-temp-2">0.0</span>
                            </div>
                            <!-- 推理模型温度默认为 0 -->
                            <input type="range" min="0" max="2" step="0.1" value="0.0" oninput="updateSliderVal('val-temp-2', this.value)">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= 底部新增大按钮 ================= -->
        <button class="btn btn-dashed">
            <i data-lucide="plus-circle" style="width: 18px; height: 18px;"></i>
            添加自定义 API 供应商
        </button>

    </main>

    <script>
        // 初始化 Icons
        lucide.createIcons();

        // 密码/API KEY 显示隐藏切换
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const btn = input.nextElementSibling;
            
            if (input.type === "password") {
                input.type = "text";
                // 替换为闭眼 icon
                btn.innerHTML = '<i data-lucide="eye-off" style="width: 16px; height: 16px;"></i>';
            } else {
                input.type = "password";
                // 替换为睁眼 icon
                btn.innerHTML = '<i data-lucide="eye" style="width: 16px; height: 16px;"></i>';
            }
            lucide.createIcons(); // 重新渲染 icon
        }

        // 联动更新滑块上的数值显示
        function updateSliderVal(spanId, val) {
            // 保证显示一位小数如 "0.0"
            document.getElementById(spanId).innerText = parseFloat(val).toFixed(1);
        }
    </script>
</body>
</html>
