<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Auto-Scroll Algorithms | Otherone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-page: #F9F9F8;
            --bg-card: #FFFFFF;
            --text-dark: #050505;
            --text-muted: #737373;
            --border-light: rgba(0, 0, 0, 0.08);
            --accent-blue: #0070F3;
            --font-body: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-page);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 原型主容器 */
        .workspace {
            width: 100%;
            max-width: 600px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 600px; /* 锁死高度产生滚动 */
        }

        /* 顶部控制台 */
        .control-panel {
            padding: 20px;
            background: #FAFAFA;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
        }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-family: var(--font-display); font-size: 16px; }
        
        .btn-stream {
            background: var(--text-dark); color: #fff; border: none; padding: 8px 16px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: transform 0.2s;
        }
        .btn-stream:active { transform: scale(0.95); }
        .btn-stream:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 算法切换器 */
        .mode-selector {
            display: flex; background: rgba(0,0,0,0.05); padding: 4px; border-radius: 8px;
        }
        .mode-btn {
            flex: 1; padding: 6px 0; text-align: center; font-size: 13px; font-weight: 500;
            color: var(--text-muted); cursor: pointer; border: none; background: transparent; border-radius: 6px;
        }
        .mode-btn.active { background: #fff; color: var(--text-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* 用户打断提示 */
        .interrupt-badge {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 6px 12px; border-radius: 100px;
            font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 20;
        }
        .interrupt-badge.show { opacity: 1; }

        /* 对话显示区域 */
        .chat-window {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            position: relative;
        }
        
        /* 模式1 需要的 CSS */
        .scroll-mode-1 { scroll-behavior: smooth; }

        .chat-bubble {
            background: #F4F4F5; padding: 16px 20px; border-radius: 12px 12px 12px 4px;
            font-size: 15px; line-height: 1.7; margin-bottom: 24px; max-width: 90%;
        }

        /* 显影特效文字 */
        .blur-word {
            display: inline-block; opacity: 0; filter: blur(4px); transform: translateY(2px);
            animation: focusIn 0.3s ease-out forwards; white-space: pre-wrap;
        }
        @keyframes focusIn { to { opacity: 1; filter: blur(0); transform: translateY(0); } }

        /* 底部留白区域，对于模式3非常重要 */
        .bottom-spacer { height: 40px; }

    </style>
</head>
<body>

    <div class="workspace">
        <div class="interrupt-badge" id="interruptBadge">User Scrolled: Auto-scroll Paused</div>

        <div class="control-panel">
            <div class="header">
                <h2>Scroll Algorithms</h2>
                <button class="btn-stream" id="startBtn" onclick="startStream()">Start Stream</button>
            </div>
            
            <div class="mode-selector">
                <button class="mode-btn active" onclick="setMode(1, this)">1. CSS Smooth</button>
                <button class="mode-btn" onclick="setMode(2, this)">2. Fluid Lerp</button>
                <button class="mode-btn" onclick="setMode(3, this)">3. Smart Padding</button>
            </div>
        </div>

        <div class="chat-window scroll-mode-1" id="chatWindow">
            <div class="chat-bubble">Can you explain the architecture of a modern desktop agent?</div>
            
            <div class="chat-bubble ai-bubble" style="display: none;" id="aiBubble">
                <div id="streamContent"></div>
            </div>
            
            <div class="bottom-spacer"></div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const streamContent = document.getElementById('streamContent');
        const aiBubble = document.getElementById('aiBubble');
        const startBtn = document.getElementById('startBtn');
        const interruptBadge = document.getElementById('interruptBadge');

        let currentMode = 1;
        let isStreaming = false;
        let lerpAnimationId = null;
        let userInterrupted = false;

        const longText = `Certainly. A modern desktop autonomous agent architecture fundamentally shifts away from cloud-only processing towards local execution. 

Firstly, it requires an orchestrator layer. This layer decides when to use a lightweight local LLM (like Llama 3 8B) for fast, privacy-preserving tasks, and when to route complex reasoning to cloud giants like GPT-4o. 

Secondly, the agent needs system-level access. Unlike a web app, a desktop agent requires native hooks into the OS. It uses tools to execute bash scripts, read the local file system, and even manipulate application windows via Accessibility APIs.

Thirdly, memory management is crucial. We implement a dual-memory system: short-term context window manipulation for the current session, and long-term vector database storage (like local ChromaDB) to recall past interactions and user preferences seamlessly.

To ensure safety, all terminal executions are containerized or sandboxed, requiring explicit user approval for destructive actions. This hybrid approach guarantees both extreme speed and uncompromising security.`;

        // 切换模式
        function setMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            
            // 只有模式1使用纯 CSS 平滑滚动
            if(mode === 1) chatWindow.classList.add('scroll-mode-1');
            else chatWindow.classList.remove('scroll-mode-1');
        }

        // 监听用户鼠标滚轮 (打断逻辑)
        chatWindow.addEventListener('wheel', (e) => {
            if (!isStreaming) return;
            // 如果用户向上滚动 (e.deltaY < 0)，则暂停自动滚动
            if (e.deltaY < 0) {
                userInterrupted = true;
                interruptBadge.classList.add('show');
            } else {
                // 如果用户向下滚到底部，恢复自动滚动
                const isAtBottom = chatWindow.scrollHeight - chatWindow.scrollTop - chatWindow.clientHeight < 50;
                if (isAtBottom) {
                    userInterrupted = false;
                    interruptBadge.classList.remove('show');
                }
            }
        });

        /* ================= 核心滚动算法实现 ================= */
        
        // 算法 1：纯 CSS 驱动 (简单调用)
        function doCssSmoothScroll() {
            if (userInterrupted) return;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // 算法 2：Fluid Lerp (线性插值平滑阻尼)
        // 这个方法不在每个 Token 到达时调用 scrollTo，而是在后台一直运行，让距离平滑衰减
        function startLerpScroll() {
            if (userInterrupted) return;
            
            const targetScroll = chatWindow.scrollHeight - chatWindow.clientHeight;
            const currentScroll = chatWindow.scrollTop;
            
            // 核心公式：每次移动剩余距离的 8% (数值越小越柔和)
            const distance = targetScroll - currentScroll;
            
            if (distance > 1) { // 避免无意义的微小计算
                chatWindow.scrollTop = currentScroll + (distance * 0.08);
            }
            
            if (isStreaming) {
                lerpAnimationId = requestAnimationFrame(startLerpScroll);
            }
        }

        // 算法 3：Smart Padding (智能安全区感知)
        function doSmartPaddingScroll() {
            if (userInterrupted) return;
            
            const targetScroll = chatWindow.scrollHeight - chatWindow.clientHeight;
            const currentScroll = chatWindow.scrollTop;
            const distanceToBottom = targetScroll - currentScroll;

            // 核心逻辑：只有当文字把底部挤得只剩不到 80px 时，才开始平滑滚动
            // 这样能保持文字和底框始终有一个优雅的“呼吸距离”
            if (distanceToBottom > 80) {
                // 使用类似模式2的 Lerp 让它推下去，保持 80px 的间距
                chatWindow.scrollTop = currentScroll + ((distanceToBottom - 80) * 0.1);
            }
        }

        // 路由滚动控制器
        function triggerAutoScroll() {
            if (currentMode === 1) doCssSmoothScroll();
            if (currentMode === 3) doSmartPaddingScroll();
            // 模式 2 是由 requestAnimationFrame 独立循环控制的，无需在此触发
        }

        /* ================= 模拟流式加载 ================= */

        function startStream() {
            if(isStreaming) return;
            isStreaming = true;
            userInterrupted = false;
            interruptBadge.classList.remove('show');
            startBtn.disabled = true;
            
            streamContent.innerHTML = '';
            aiBubble.style.display = 'block';
            
            const tokens = longText.match(/[\w]+|[^\s\w]|\s+/g);
            let i = 0;

            // 如果是模式2，启动独立的物理演算循环
            if (currentMode === 2) {
                cancelAnimationFrame(lerpAnimationId);
                startLerpScroll();
            }

            function streamToken() {
                if (i < tokens.length) {
                    const span = document.createElement('span');
                    span.className = 'blur-word';
                    span.textContent = tokens[i];
                    streamContent.appendChild(span);
                    
                    i++;
                    
                    // 触发滚动路由
                    triggerAutoScroll();

                    // 模拟网络延迟 (5-30ms)
                    setTimeout(streamToken, Math.random() * 25 + 5);
                } else {
                    // 完成
                    isStreaming = false;
                    startBtn.disabled = false;
                    cancelAnimationFrame(lerpAnimationId);
                    
                    // 输出完毕后，强制滚动到最底
                    setTimeout(() => {
                        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
                    }, 500);
                }
            }

            streamToken();
        }
    </script>
</body>
</html>
